<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Summary</title>
    <!-- Auto-return to the main menu after ~15 seconds -->
    <meta http-equiv="refresh" content="15;url={{ url_for('main_menu', table_number=order.table_number) }}">
</head>
<body>
    <h1>Order Summary</h1>
    <h2>Customer Name: {{ order.customer_name }}</h2>
    <h3>Table Number: {{ order.table_number }}</h3>
    <h3>Order Summary:</h3>
    <pre>
{% for line in order.order_items %}
{{ line }}
{% endfor %}
    </pre>
</body>
</html>
